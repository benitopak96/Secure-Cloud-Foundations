name: DevSecOps-Scan

# 1. Trigger the scan every time you push code to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    steps:
      # 2. Check out your code so the scanner can see it
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 3. Run the Checkov Security Scanner
      - name: Run Checkov Scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: results.sarif
